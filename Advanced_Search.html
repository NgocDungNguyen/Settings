<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Search Settings – Findter Filter &amp; Search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--ff:'Inter',-apple-system,BlinkMacSystemFont,'San Francisco','Segoe UI',sans-serif;
--bg:rgba(241,241,241,1);--sf:#fff;--sf-hov:rgba(247,247,247,1);--sf-act:rgba(243,243,243,1);
--fill:#303030;--fill-hov:#1a1a1a;
--text:rgba(48,48,48,1);--text2:rgba(97,97,97,1);--textd:rgba(181,181,181,1);--lnk:rgba(0,91,211,1);
--bdr:rgba(227,227,227,1);
--r1:4px;--r2:8px;--r3:12px;
--sh1:0px 1px 0px 0px rgba(26,26,26,.07);
--sh3:0px 4px 6px -2px rgba(26,26,26,.2);
--shbtn:0px -1px 0px 0px #b5b5b5 inset,0px 0px 0px 1px rgba(0,0,0,.1) inset,0px .5px 0px 1.5px #fff inset;
--shbtn-hov:0px 1px 0px 0px #ebebeb inset,-1px 0px 0px 0px #ebebeb inset,1px 0px 0px 0px #ebebeb inset,0px -1px 0px 0px #ccc inset;
}
html,body{font-family:var(--ff);background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;min-height:100vh}
a{color:var(--lnk)}
.lay{display:flex;min-height:100vh}
.sb{width:248px;background:var(--sf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;transition:width .25s;min-height:100vh}
.sb.col{width:56px}
.sb-hd{padding:12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);gap:8px;overflow:hidden}
.sb-logo{width:28px;height:28px;border-radius:6px;background:var(--fill);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-title{font-size:13px;font-weight:650;color:var(--text);flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.sb-tgl{width:28px;height:28px;border:none;background:transparent;cursor:pointer;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0}
.sb-tgl:hover{background:var(--sf-hov)}
.sb-nav{padding:8px;display:flex;flex-direction:column;gap:2px;flex:1}
.nav-btn{width:100%;border:none;background:transparent;cursor:pointer;padding:6px 12px;border-radius:var(--r2);font-family:var(--ff);font-size:13px;font-weight:450;color:var(--text2);text-align:left;display:flex;align-items:center;overflow:hidden;transition:background .1s,color .1s;white-space:nowrap}
.nav-btn:hover:not([disabled]){background:var(--sf-hov);color:var(--text)}
.nav-btn.act{background:var(--sf-act)!important;color:var(--text)!important;font-weight:650}
.nav-btn[disabled]{color:var(--textd)!important;cursor:not-allowed}
.nav-more{width:100%;border:none;background:transparent;cursor:pointer;padding:4px 12px;font-family:var(--ff);font-size:12px;color:var(--textd);text-align:left;display:flex;align-items:center;gap:4px;transition:color .1s;white-space:nowrap}
.nav-more:hover{color:var(--text2)}
.nav-sp{flex:1;min-height:4px}
.nav-sep{height:1px;background:var(--bdr);margin:2px 0;flex-shrink:0}
.nav-lbl{overflow:hidden;text-overflow:ellipsis}
.main{flex:1;overflow-x:hidden}
.pg{max-width:960px;margin:0 auto;padding:24px}
.ic{width:16px;height:16px;fill:currentColor;display:block;flex-shrink:0}
.card{background:var(--sf);border-radius:var(--r2);box-shadow:var(--sh3);overflow:hidden}
.card-bd{padding:16px;display:flex;flex-direction:column;gap:16px}
.back-a{width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--r2);text-decoration:none;border:1px solid var(--bdr);background:var(--sf);color:var(--text2);box-shadow:var(--sh1);flex-shrink:0;transition:background .1s}
.back-a:hover{background:var(--sf-hov)}
.mt5{margin-top:20px}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="lay">
  <aside class="sb" id="sidebar">
    <div class="sb-hd">
      <a href="index.html" style="display:flex;align-items:center;gap:8px;flex:1;text-decoration:none;overflow:hidden;min-width:0;color:inherit" title="Home"><div class="sb-logo">Fd</div><span class="sb-title nav-lbl">Findter Filter &amp; Search</span></a>
      <button class="sb-tgl" id="sidebar-toggle" title="Toggle sidebar">
        <span id="toggle-icon"><svg class="ic" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.78 5.97a.75.75 0 0 1 0 1.06L8.81 10l2.97 2.97a.75.75 0 1 1-1.06 1.06l-3.5-3.5a.75.75 0 0 1 0-1.06l3.5-3.5a.75.75 0 0 1 1.06 0Z" fill="currentColor"/></svg></span>
      </button>
    </div>
    <div class="sb-nav" id="nav"></div>
  </aside>
  <main class="main">
    <div class="pg">

      <!-- Page header -->
      <div style="display:flex;align-items:center;gap:12px">
        <a href="Search.html" class="back-a" title="Back to Search">
          <svg class="ic" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M17 10a.75.75 0 0 1-.75.75H5.56l2.72 2.72a.75.75 0 1 1-1.06 1.06l-4-4a.75.75 0 0 1 0-1.06l4-4a.75.75 0 0 1 1.06 1.06L5.56 9.25H16.25A.75.75 0 0 1 17 10Z" fill="currentColor"/></svg>
        </a>
        <div>
          <h1 style="font-size:1.25rem;font-weight:650;line-height:1.3">Advanced Search Settings</h1>
          <p style="font-size:13px;color:var(--text2);margin-top:2px">Advanced configuration for search behavior.</p>
        </div>
      </div>

      <!-- Placeholder card -->
      <div class="card mt5">
        <div class="card-bd" style="align-items:center;padding:40px 16px;text-align:center">
          <svg style="width:36px;height:36px;fill:var(--textd)" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M13.74 12.68a6.5 6.5 0 1 1 1.06-1.06l3.26 3.27a.75.75 0 1 1-1.06 1.06l-3.26-3.27Zm.76-5.18a5 5 0 1 1-10 0 5 5 0 0 1 10 0Z" fill="currentColor"/></svg>
          <p style="font-size:13px;font-weight:550;color:var(--text2);margin-top:12px">Coming soon</p>
          <p style="font-size:12px;color:var(--textd);margin-top:4px">Advanced search options will be available here.</p>
        </div>
      </div>

    </div>
  </main>
</div>
<script>
const $=id=>document.getElementById(id);
const IC={
  chevL:`<svg class="ic" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.78 5.97a.75.75 0 0 1 0 1.06L8.81 10l2.97 2.97a.75.75 0 1 1-1.06 1.06l-3.5-3.5a.75.75 0 0 1 0-1.06l3.5-3.5a.75.75 0 0 1 1.06 0Z" fill="currentColor"/></svg>`,
  chevR:`<svg class="ic" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.22 5.97a.75.75 0 0 0 0 1.06L11.19 10 8.22 12.97a.75.75 0 1 0 1.06 1.06l3.5-3.5a.75.75 0 0 0 0-1.06l-3.5-3.5a.75.75 0 0 0-1.06 0Z" fill="currentColor"/></svg>`,
};
const NAV_MAIN=[
  {id:'filter',   label:'Filter'},
  {id:'search',   label:'Search'},
  {id:'settings', label:'Settings'},
  {id:'ymm',      label:'Year Make Model'},
  {id:'advanced', label:'Advanced Feature'},
  {id:'analytics',label:'Analytics'},
];
const NAV_MORE_ITEMS=[{id:'subscription',label:'Subscription'}];
const NAV_BTM={id:'storefront',label:'Storefront Preview'};
const ENABLED=new Set(['filter','search','settings','ymm','advanced','storefront']);
const ACTIVE='search';
let col=false;
let navExp=false;
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function renderNav(){
  function nb(n,act,en,style){return`<button data-nav="${n.id}"${en?'':' disabled'} class="nav-btn${act?' act':''}" title="${n.label}"${style?` style="${style}"`:''}><span class="nav-lbl">${escapeHtml(n.label)}</span></button>`;}
  const main=NAV_MAIN.map(n=>nb(n,n.id===ACTIVE,ENABLED.has(n.id))).join('');
  const tgl=`<button id="nav-exp" class="nav-more"><span class="nav-lbl">${navExp?'View less':'View more'}</span><svg style="flex-shrink:0;transition:transform .2s;transform:rotate(${navExp?180:0}deg)" width="10" height="10" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z"/></svg></button>`;
  const more=navExp?NAV_MORE_ITEMS.map(n=>nb(n,n.id===ACTIVE,ENABLED.has(n.id),'padding-left:24px')).join(''):'';
  const btm=nb(NAV_BTM,NAV_BTM.id===ACTIVE,ENABLED.has(NAV_BTM.id));
  $('nav').innerHTML=main+more+btm+`<div class="nav-sep" style="margin-top:auto;flex-shrink:0"></div>`+tgl;
  $('nav').querySelectorAll('[data-nav]').forEach(b=>{
    if(!ENABLED.has(b.dataset.nav))return;
    b.onclick=()=>{
      const v=b.dataset.nav;
      if(v==='settings')location.href='Settings.html';
      else if(v==='search')location.href='Search.html';
      else if(v==='filter')location.href='Filter.html';
      else if(v==='ymm')location.href='YearMakeModel.html';
      else if(v==='advanced')location.href='Advanced_Feature.html';
      else if(v==='storefront')location.href='StoreFront.html';
    };
  });
  const expBtn=$('nav-exp');
  if(expBtn)expBtn.onclick=()=>{navExp=!navExp;renderNav();updateSb();};
  updateSb();
}
function updateSb(){
  $('sidebar').classList.toggle('col',col);
  $('sidebar').querySelectorAll('.nav-lbl').forEach(el=>el.classList.toggle('hidden',col));
  document.querySelector('.sb-title').classList.toggle('hidden',col);
  $('toggle-icon').innerHTML=col?IC.chevR:IC.chevL;
  const expBtn=$('nav-exp');if(expBtn)expBtn.style.display=col?'none':'';
}
$('sidebar-toggle').onclick=()=>{col=!col;updateSb();};
renderNav();
</script>
</body>
</html>
