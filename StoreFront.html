<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Demo Store – Powered by Findter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f6f6f7;--white:#fff;--text:#121212;--text2:#6d6d6d;--text3:#aaa;--bdr:#e0e0e0;--bdr2:#bbb;--acc:#121212;--acc-hov:#333;--sale:#b91c1c;--new:#16a34a;--r1:4px;--r2:8px;--r3:12px;--hh:60px;--sb-w:248px}
html{font-family:'Inter',system-ui,sans-serif;font-size:14px;background:var(--bg);color:var(--text)}
body{min-height:100vh;transition:padding-left .25s}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
/* ── Header ── */
#hdr{position:fixed;top:0;left:var(--sb-w);right:0;z-index:50;height:var(--hh);background:var(--white);border-bottom:1px solid var(--bdr);transition:left .25s}
.hdr-inner{max-width:1320px;margin:0 auto;height:100%;display:flex;align-items:center;justify-content:space-between;padding:0 24px;gap:24px}
.hdr-left{display:flex;align-items:center;gap:32px}
.hdr-logo{font-size:18px;font-weight:700;letter-spacing:-.5px}
.hdr-nav{display:flex;gap:20px}
.hdr-nav a{font-size:13px;font-weight:500;color:var(--text2);transition:color .1s}
.hdr-nav a:hover,.hdr-nav a.cur{color:var(--text)}
.hdr-right{display:flex;align-items:center;gap:4px}
.hdr-ib{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--r1);color:var(--text);transition:background .1s;position:relative}
.hdr-ib:hover{background:#f0f0f0}
.cart-dot{position:absolute;top:5px;right:5px;width:14px;height:14px;background:var(--acc);color:#fff;font-size:9px;font-weight:700;border-radius:50%;display:flex;align-items:center;justify-content:center}
/* ── Search Overlay ── */
#so{position:fixed;top:var(--hh);left:var(--sb-w);right:0;z-index:45;background:var(--white);border-bottom:1px solid var(--bdr);box-shadow:0 8px 32px rgba(0,0,0,.12);max-height:calc(90vh - var(--hh));overflow-y:auto;transform:translateY(-6px);opacity:0;pointer-events:none;transition:transform .18s,opacity .18s}
#so.open{transform:translateY(0);opacity:1;pointer-events:all}
.so-inner{max-width:840px;margin:0 auto;padding:20px 24px}
.so-row{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.so-inp-wrap{flex:1;display:flex;align-items:center;gap:10px;border:1.5px solid var(--bdr2);border-radius:var(--r2);padding:9px 14px;background:var(--white);transition:border-color .1s}
.so-inp-wrap:focus-within{border-color:var(--acc)}
#so-inp{flex:1;font-family:inherit;font-size:16px;border:none;outline:none;color:var(--text)}
#so-inp::placeholder{color:var(--text3)}
.so-clear{color:var(--text3);font-size:18px;line-height:1;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .1s,color .1s}
.so-clear:hover{background:#f0f0f0;color:var(--text)}
.so-close{font-size:13px;font-weight:600;color:var(--text2);padding:7px 14px;border-radius:var(--r2);border:1px solid var(--bdr);transition:background .1s,border-color .1s;white-space:nowrap}
.so-close:hover{background:#f0f0f0;border-color:var(--bdr2)}
.so-sec-ttl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:12px}
.so-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.so-card{border-radius:var(--r2);border:1px solid var(--bdr);overflow:hidden;cursor:pointer;transition:box-shadow .15s,transform .15s}
.so-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-1px)}
.so-card-img{aspect-ratio:1;overflow:hidden}
.so-card-info{padding:8px}
.so-card-title{font-size:12px;font-weight:600;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.so-card-price{font-size:12px;color:var(--text2);margin-top:2px}
.so-rd{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff7ed;border:1px solid #fed7aa;border-radius:var(--r2);margin-bottom:16px}
.so-rd-text{font-size:13px;color:#9a3412;font-weight:500}
.so-rd-link{text-decoration:underline;color:#9a3412;cursor:pointer}
.so-list{display:flex;flex-direction:column}
.so-row-item{display:flex;align-items:center;gap:12px;padding:10px 6px;border-radius:var(--r2);cursor:pointer;transition:background .1s}
.so-row-item:hover{background:var(--bg)}
.so-thumb{width:48px;height:48px;border-radius:var(--r1);flex-shrink:0;overflow:hidden}
.so-item-info{flex:1;min-width:0}
.so-item-title{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.so-item-sub{font-size:12px;color:var(--text2);margin-top:1px}
.so-item-price{font-size:14px;font-weight:700;flex-shrink:0}
.so-empty{text-align:center;padding:40px 0}
.so-empty-ttl{font-size:16px;font-weight:700;margin-bottom:6px}
.so-empty-sub{font-size:13px;color:var(--text2);margin-bottom:24px}
/* ── Page ── */
.pw{max-width:1320px;margin:0 auto;padding:calc(var(--hh) + 24px) 24px 48px}
.bc{font-size:12px;color:var(--text2);margin-bottom:16px}
.bc strong{color:var(--text)}
.col-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.col-hdr h1{font-size:24px;font-weight:700;letter-spacing:-.5px}
/* Sort */
.sort-wrap{position:relative}
#sort-btn{display:flex;align-items:center;gap:8px;padding:8px 14px;border:1px solid var(--bdr);border-radius:var(--r2);font-size:13px;font-weight:600;color:var(--text);background:var(--white);transition:border-color .1s}
#sort-btn:hover{border-color:var(--bdr2)}
#sort-drop{background:var(--white);border:1px solid var(--bdr);border-radius:var(--r2);box-shadow:0 8px 24px rgba(0,0,0,.15);min-width:200px;overflow:hidden;z-index:90}
.sort-opt{display:block;width:100%;padding:10px 16px;text-align:left;font-size:13px;font-weight:500;transition:background .1s;color:var(--text);border:none;background:none;cursor:pointer;font-family:inherit}
.sort-opt:hover{background:var(--bg)}
.sort-opt.cur{font-weight:700}
/* Active filters */
#af-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;align-items:center}
.af-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px 4px 12px;background:var(--acc);color:#fff;border-radius:100px;font-size:12px;font-weight:600}
.af-tag button{color:rgba(255,255,255,.7);font-size:16px;line-height:1;padding:0 0 0 2px;transition:color .1s}
.af-tag button:hover{color:#fff}
#af-clear{font-size:12px;color:var(--text2);text-decoration:underline;cursor:pointer;padding:4px 6px;background:none;border:none;font-family:inherit}
/* Layout */
.col-layout{display:flex;gap:28px;align-items:flex-start}
/* Filter sidebar */
.fsb{width:216px;flex-shrink:0;position:sticky;top:calc(var(--hh)+16px)}
.fsb-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.fsb-hdr h2{font-size:15px;font-weight:700}
.fsb-filter-sec{border-top:1px solid var(--bdr)}
.fst-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:13px 0;font-size:13px;font-weight:600;color:var(--text);background:none;border:none;cursor:pointer;font-family:inherit}
.fst-chev{font-size:9px;transition:transform .2s;color:var(--text3)}
.fst-body{padding-bottom:14px;display:flex;flex-direction:column;gap:9px}
.fst-body.closed{display:none}
.fcrow{display:flex;align-items:center;gap:9px;cursor:pointer}
.fcrow input{width:15px;height:15px;accent-color:var(--acc);cursor:pointer;flex-shrink:0}
.fclbl{font-size:13px;color:var(--text)}
.fccnt{font-size:11px;color:var(--text3);margin-left:auto}
.swatch-row{display:flex;flex-wrap:wrap;gap:8px}
.swatch{width:22px;height:22px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:border-color .1s,transform .1s;flex-shrink:0}
.swatch:hover,.swatch.sel{border-color:var(--acc);transform:scale(1.12)}
/* Main area */
.col-main{flex:1;min-width:0}
.pcount{font-size:13px;color:var(--text2);margin-bottom:10px}
/* Grid */
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.pcard{background:var(--white);border-radius:var(--r3);overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .15s}
.pcard:hover{box-shadow:0 4px 20px rgba(0,0,0,.1)}
.pimg-wrap{position:relative;aspect-ratio:4/5;overflow:hidden}
.pimg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;transition:transform .3s}
.pcard:hover .pimg{transform:scale(1.04)}
.pbadge{position:absolute;top:10px;left:10px;color:#fff;font-size:11px;font-weight:700;padding:3px 8px;border-radius:var(--r1)}
.pbadge-sale{background:var(--sale)}
.pbadge-new{background:var(--new)}
.pinfo{padding:12px;flex:1;display:flex;flex-direction:column;gap:3px}
.ptype{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3)}
.ptitle{font-size:14px;font-weight:600;line-height:1.35}
.prow{display:flex;align-items:baseline;gap:6px;margin-top:2px}
.pprice{font-size:14px;font-weight:700}
.pcompare{font-size:13px;color:var(--text3);text-decoration:line-through}
.psizes{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.psize{padding:2px 7px;border:1px solid var(--bdr);border-radius:var(--r1);font-size:11px;color:var(--text2)}
.poos{font-size:11px;color:var(--text3);margin-top:4px;font-style:italic}
.padd{margin-top:8px;width:100%;padding:9px;background:var(--acc);color:#fff;border-radius:var(--r2);font-size:13px;font-weight:600;transition:background .15s}
.padd:hover{background:var(--acc-hov)}
.padd:disabled{background:#ccc;cursor:not-allowed}
/* No results */
.no-res{text-align:center;padding:48px 24px;grid-column:1/-1}
.no-res h3{font-size:18px;font-weight:700;margin-bottom:8px}
.no-res p{font-size:13px;color:var(--text2);margin-bottom:24px}
/* Misc */
.hidden{display:none!important}
.ic{width:18px;height:18px;fill:currentColor;display:block;flex-shrink:0}
/* ── Admin sidebar ── */
.asb{position:fixed;top:0;left:0;bottom:0;width:248px;background:#fff;border-right:1px solid #e3e3e3;z-index:60;display:flex;flex-direction:column;transition:width .25s;overflow:hidden}
.asb.col{width:56px}
.asb-hd{padding:12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e3e3e3;gap:8px;flex-shrink:0;min-height:52px}
.asb-logo{width:28px;height:28px;border-radius:6px;background:#303030;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.asb-name{font-size:13px;font-weight:650;color:#303030;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.asb-tgl{width:28px;height:28px;border:none;background:transparent;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#616161;font-size:18px;line-height:1}
.asb-tgl:hover{background:#f7f7f7}
.asb-body{padding:8px;display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto}
.asb-btn{width:100%;border:none;background:transparent;cursor:pointer;padding:6px 12px;border-radius:8px;font-family:'Inter',sans-serif;font-size:13px;font-weight:450;color:#616161;text-align:left;display:flex;align-items:center;overflow:hidden;transition:background .1s,color .1s;white-space:nowrap}
.asb-btn:hover:not([disabled]){background:#f7f7f7;color:#303030}
.asb-btn.cur{background:#f3f3f3!important;color:#303030!important;font-weight:650}
.asb-btn[disabled]{color:#b5b5b5!important;cursor:not-allowed}
.asb-lbl{overflow:hidden;text-overflow:ellipsis;flex:1}
.asb-live{font-size:10px;font-weight:700;background:#16a34a;color:#fff;padding:2px 6px;border-radius:3px;margin-left:6px;flex-shrink:0;letter-spacing:.03em}
</style>
</head>
<body>

<!-- ═══ ADMIN SIDEBAR ═══ -->
<nav id="asb" class="asb">
  <div class="asb-hd">
    <div class="asb-logo">Fd</div>
    <span class="asb-name">Findter Admin</span>
    <button id="asb-tgl" class="asb-tgl" title="Toggle sidebar">‹</button>
  </div>
  <div id="asb-body" class="asb-body"></div>
</nav>

<!-- ═══ HEADER ═══ -->
<header id="hdr">
  <div class="hdr-inner">
    <div class="hdr-left">
      <span class="hdr-logo">Demo Store</span>
      <nav class="hdr-nav">
        <a href="#">Home</a>
        <a href="#" class="cur">Collections</a>
        <a href="#">About</a>
      </nav>
    </div>
    <div class="hdr-right">
      <button id="search-btn" class="hdr-ib" title="Search">
        <svg class="ic" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M13.74 12.68a6.5 6.5 0 1 1 1.06-1.06l3.26 3.27a.75.75 0 1 1-1.06 1.06l-3.26-3.27Zm.76-5.18a5 5 0 1 1-10 0 5 5 0 0 1 10 0Z" fill="currentColor"/></svg>
      </button>
      <button class="hdr-ib" title="Cart">
        <svg class="ic" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.5 3.75a.75.75 0 0 1 .75-.75h7.5a.75.75 0 0 1 .74.63l.89 5.37H4.62l.89-5.37A.75.75 0 0 1 5.5 3.75ZM3 10.25h14l-1.18 6.5A.75.75 0 0 1 15.07 17H4.93a.75.75 0 0 1-.74-.63L3 10.25Z" fill="currentColor"/></svg>
        <span class="cart-dot" id="cart-count">2</span>
      </button>
    </div>
  </div>
</header>

<!-- ═══ SEARCH OVERLAY ═══ -->
<div id="so">
  <div class="so-inner">
    <div class="so-row">
      <div class="so-inp-wrap">
        <svg class="ic" style="color:var(--text3);flex-shrink:0" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M13.74 12.68a6.5 6.5 0 1 1 1.06-1.06l3.26 3.27a.75.75 0 1 1-1.06 1.06l-3.26-3.27Zm.76-5.18a5 5 0 1 1-10 0 5 5 0 0 1 10 0Z" fill="currentColor"/></svg>
        <input id="so-inp" placeholder="Search products, brands, and more…" autocomplete="off" spellcheck="false">
        <button id="so-clear-btn" class="so-clear hidden" title="Clear">×</button>
      </div>
      <button id="so-close-btn" class="so-close">Close</button>
    </div>
    <!-- Zero char: trending -->
    <div id="so-zero">
      <p class="so-sec-ttl">Trending Products</p>
      <div class="so-grid" id="so-zc-grid"></div>
    </div>
    <!-- Has query results -->
    <div id="so-has-results" class="hidden">
      <div id="so-rd-msg" class="so-rd hidden">
        <svg class="ic" style="color:#f97316;flex-shrink:0" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3 10a.75.75 0 0 1 .75-.75h10.69L11.72 6.53a.75.75 0 0 1 1.06-1.06l4 4a.75.75 0 0 1 0 1.06l-4 4a.75.75 0 1 1-1.06-1.06l2.72-2.72H3.75A.75.75 0 0 1 3 10Z" fill="currentColor"/></svg>
        <span class="so-rd-text">Redirecting to <span id="so-rd-label" class="so-rd-link"></span> →</span>
      </div>
      <div class="so-list" id="so-list"></div>
      <p id="so-view-all" class="hidden" style="text-align:center;padding:10px 0;font-size:13px;color:var(--text2)"></p>
    </div>
    <!-- No results -->
    <div id="so-empty" class="hidden">
      <div class="so-empty">
        <p class="so-empty-ttl">No results for "<span id="so-query-lbl"></span>"</p>
        <p class="so-empty-sub">Try a different search term or browse collections below.</p>
      </div>
      <p class="so-sec-ttl">You might also like</p>
      <div class="so-grid" id="so-sug-grid"></div>
    </div>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="pw">
  <nav class="bc">Home / <strong>All Products</strong></nav>
  <div class="col-hdr">
    <h1 id="col-h1">All Products</h1>
    <div class="sort-wrap">
      <button id="sort-btn">
        <span>Sort by: </span>
        <span id="sort-lbl">Featured</span>
        <svg style="width:12px;height:12px;fill:currentColor;transition:transform .15s" id="sort-chev" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" fill="currentColor"/></svg>
      </button>
      <div id="sort-drop" class="hidden" style="position:fixed"></div>
    </div>
  </div>
  <div id="af-wrap"></div>
  <div class="col-layout">
    <!-- FILTER SIDEBAR -->
    <aside class="fsb">
      <div class="fsb-hdr">
        <h2>Filters</h2>
        <button id="clear-all-btn" class="hidden" style="font-size:12px;color:var(--text2);text-decoration:underline">Clear all</button>
      </div>
      <div class="fsb-filter-sec">
        <button class="fst-btn" data-sec="type">Product Type <span class="fst-chev">▾</span></button>
        <div class="fst-body" id="fsb-type"></div>
      </div>
      <div class="fsb-filter-sec">
        <button class="fst-btn" data-sec="price">Price <span class="fst-chev">▾</span></button>
        <div class="fst-body" id="fsb-price"></div>
      </div>
      <div class="fsb-filter-sec">
        <button class="fst-btn" data-sec="color">Color <span class="fst-chev">▾</span></button>
        <div class="fst-body" id="fsb-color"></div>
      </div>
      <div class="fsb-filter-sec">
        <button class="fst-btn" data-sec="vendor">Vendor <span class="fst-chev">▾</span></button>
        <div class="fst-body" id="fsb-vendor"></div>
      </div>
    </aside>
    <!-- PRODUCT AREA -->
    <main class="col-main">
      <p class="pcount" id="pcount">20 products</p>
      <div class="pgrid" id="pgrid"></div>
    </main>
  </div>
</div>

<!-- ═══ SETTINGS STATUS BADGE ═══ -->
<div id="settings-status" style="position:fixed;bottom:20px;right:20px;background:#16a34a;color:#fff;border-radius:8px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;padding:8px 14px;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(0,0,0,.25);z-index:60;cursor:default;user-select:none">
  <span style="width:7px;height:7px;background:#fff;border-radius:50%;flex-shrink:0;opacity:.9"></span>
  <span id="status-txt">Loading settings…</span>
</div>

<script>
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const $=id=>document.getElementById(id);

/* ── Admin sidebar ── */
const ASB_NAV=[
  {id:'filter',label:'Filter'},{id:'search',label:'Search'},
  {id:'metafield',label:'Metafield'},
  {id:'grid',label:'Filter & Product Grid Design'},{id:'settings',label:'Settings'},
  {id:'analytics',label:'Analytics'},{id:'advanced',label:'Advanced Features'},
  {id:'storefront',label:'Storefront Preview',live:true},
];
const ASB_ENABLED=new Set(['settings','metafield','search','storefront']);
let asbCol=false;
function renderAsb(){
  $('asb-body').innerHTML=ASB_NAV.map(n=>{
    const en=ASB_ENABLED.has(n.id),act=n.id==='storefront';
    return `<button data-an="${esc(n.id)}" ${en?'':'disabled'} class="asb-btn${act?' cur':''}" ${act?'style="cursor:default"':''}>
      <span class="asb-lbl">${esc(n.label)}</span>${n.live?'<span class="asb-live">LIVE</span>':''}
    </button>`;
  }).join('');
  $('asb-body').querySelectorAll('[data-an]').forEach(b=>{
    if(!ASB_ENABLED.has(b.dataset.an)||b.dataset.an==='storefront')return;
    b.onclick=()=>{
      const v=b.dataset.an;
      if(v==='settings')location.href='index.html';
      else if(v==='metafield')location.href='Metafield.html';
      else if(v==='search')location.href='Search.html';
    };
  });
}
function setAsbWidth(w){
  document.body.style.paddingLeft=w+'px';
  $('hdr').style.left=w+'px';
  $('so').style.left=w+'px';
  const collapsed=w<100;
  $('asb-body').querySelectorAll('.asb-lbl,.asb-live').forEach(el=>el.style.display=collapsed?'none':'');
  $('asb').querySelector('.asb-name').style.display=collapsed?'none':'';
  $('asb-tgl').textContent=collapsed?'›':'‹';
}
$('asb-tgl').onclick=()=>{asbCol=!asbCol;$('asb').classList.toggle('col',asbCol);setAsbWidth(asbCol?56:248);};

/* ── Settings loader ── */
function buildSynMap(groups){
  const map={};
  groups.forEach(g=>{
    g.queries.forEach(q=>{map[q]=[...(map[q]||[]),...g.synonyms,...g.queries.filter(x=>x!==q)];});
    g.synonyms.forEach(s=>{map[s]=[...(map[s]||[]),...g.queries,...g.synonyms.filter(x=>x!==s)];});
  });
  return map;
}

function loadSettingsFromStorage(){
  const sb=lsGet('findter_sortby');
  const sch=lsGet('findter_search');
  const syn=lsGet('findter_synonyms');
  const rd=lsGet('findter_redirects');
  const vr=lsGet('findter_variant');
  if(sb){ACTIVE_EXCLUSIVE=sb.exclusiveActive||'featured';SORT_OPTS_RAW=sb.options||null;}
  if(sch){
    if(sch.fields&&sch.fields.length)SEARCH_FIELDS=new Set(sch.fields);
    if(sch.stopWords&&sch.stopWords.length)STOP_WORDS=new Set(sch.stopWords);
    if(sch.noResultProductIds)NO_RES_IDS=sch.noResultProductIds;
    if(sch.noResultKeywords)NO_RES_KEYWORDS=sch.noResultKeywords;
    if(sch.zeroCharProductIds&&sch.zeroCharProductIds.length)ZERO_CHAR_IDS=sch.zeroCharProductIds;
    NUMERIC_ENABLED=sch.numericEnabled!==undefined?sch.numericEnabled:true;
  }
  if(syn&&syn.length)SYNONYMS=buildSynMap(syn);
  if(rd&&rd.length)REDIRECTS=rd.map(r=>({terms:r.terms.split(',').map(t=>t.trim()).filter(Boolean),url:r.url,label:r.url}));
  if(vr){VARIANT_ENABLED=!!vr.enabled;VARIANT_SPLIT=new Set(vr.selectedOptions||[]);}
  return{sb,sch,syn,rd,vr};
}

  {key:'u30',label:'Under $30',fn:p=>p<30},
  {key:'30-60',label:'$30 – $60',fn:p=>p>=30&&p<=60},
  {key:'60-100',label:'$60 – $100',fn:p=>p>60&&p<=100},
  {key:'o100',label:'Over $100',fn:p=>p>100},
];

/* ── Variant expansion ── */
function getDisplayProducts(){
  if(!VARIANT_ENABLED)return MOCK_PRODUCTS.map((p,i)=>({...p,_idx:i,variantLabel:null}));
  const out=[];
  MOCK_PRODUCTS.forEach((p,i)=>{
    const canSplitSize=VARIANT_SPLIT.has('Size')&&p.sizes&&p.sizes.length>1;
    if(canSplitSize){
      p.sizes.forEach(sz=>out.push({...p,_idx:i,id:p.id+'_'+sz,variantLabel:sz,sizes:[sz]}));
    }else{
      out.push({...p,_idx:i,variantLabel:null});
    }
  });
  return out;
}

/* ── Filter application ── */
function applyFilters(products){
  return products.filter(p=>{
    if(activeFilters.types.size&&!activeFilters.types.has(p.type))return false;
    if(activeFilters.colors.size&&!activeFilters.colors.has(p.color))return false;
    if(activeFilters.vendors.size&&!activeFilters.vendors.has(p.vendor))return false;
    if(activeFilters.priceKey){const r=PRICE_RANGES.find(r=>r.key===activeFilters.priceKey);if(r&&!r.fn(p.price))return false;}
    return true;
  });
}

/* ── Relevance scoring ── */
function scoreRelevance(p,q){
  if(!q)return 0;
  let score=0;
  if(p.title.toLowerCase().includes(q))score+=10;
  (p.tags||[]).forEach(t=>{if(t.includes(q))score+=5;});
  if(p.type.toLowerCase().includes(q))score+=3;
  if(p.vendor.toLowerCase().includes(q))score+=2;
  return score;
}

/* ── Sorting — all 11 types ── */
function applySort(products){
  const a=[...products];
  const q=lastQuery.toLowerCase();
  switch(sortKey){
    case 'featured':   return a.sort((x,y)=>(x._idx||0)-(y._idx||0));
    case 'best':       return a.sort((x,y)=>(y.salesCount||0)-(x.salesCount||0));
    case 'relevant':   return q?a.sort((x,y)=>scoreRelevance(y,q)-scoreRelevance(x,q)):a.sort((x,y)=>(x._idx||0)-(y._idx||0));
    case 'newest':     return a.sort((x,y)=>new Date(y.createdAt||'2020-01-01')-new Date(x.createdAt||'2020-01-01'));
    case 'oldest':     return a.sort((x,y)=>new Date(x.createdAt||'2020-01-01')-new Date(y.createdAt||'2020-01-01'));
    case 'discount':   return a.sort((x,y)=>{const dx=x.ca>x.price?(x.ca-x.price)/x.ca:-1,dy=y.ca>y.price?(y.ca-y.price)/y.ca:-1;return dy-dx;});
    case 'az':         return a.sort((x,y)=>x.title.localeCompare(y.title));
    case 'za':         return a.sort((x,y)=>y.title.localeCompare(x.title));
    case 'priceasc':   return a.sort((x,y)=>x.price-y.price);
    case 'pricedesc':  return a.sort((x,y)=>y.price-x.price);
    case 'inventory':  return a.sort((x,y)=>(y.inventory||0)-(x.inventory||0));
    // backward compat keys
    case 'price-asc':  return a.sort((x,y)=>x.price-y.price);
    case 'price-desc': return a.sort((x,y)=>y.price-x.price);
    case 'a-z':        return a.sort((x,y)=>x.title.localeCompare(y.title));
    case 'best-selling':return a.sort((x,y)=>(y.salesCount||0)-(x.salesCount||0));
    default: return a;
  }
}

/* ── Product card HTML ── */

               p._idx<3?`<span class="pbadge pbadge-new">New</span>`:'';

    `<div class="psizes">${p.sizes.map(s=>`<span class="psize">${esc(s)}</span>`).join('')}</div>`:'';
  const compare=p.ca>0?`<span class="pcompare">$${p.ca.toFixed(2)}</span>`:'';
  const varLbl=p.variantLabel?` <span style="color:var(--text2);font-weight:400">– ${esc(p.variantLabel)}</span>`:'';
  const oos=p.inventory===0?`<p class="poos">Out of stock</p>`:'';
  return `
    <div class="pcard">
      <div class="pimg-wrap">
        <div class="pimg" style="background:${gg(p.color)}">
          <svg style="width:52px;height:52px;opacity:.18;fill:#fff" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M6 4.75A2.75 2.75 0 0 1 8.75 2h2.5A2.75 2.75 0 0 1 14 4.75V5h2.25c.414 0 .75.336.75.75v12c0 .414-.336.75-.75.75H3.75A.75.75 0 0 1 3 17.75v-12C3 5.336 3.336 5 3.75 5H6v-.25Zm2.75-1.25c-.69 0-1.25.56-1.25 1.25V5h5v-.25c0-.69-.56-1.25-1.25-1.25h-2.5ZM4.5 6.5v10h11v-10H4.5Z" fill="currentColor"/></svg>
        </div>
        ${badge}
      </div>
      <div class="pinfo">
        <p class="ptype">${esc(p.type)}</p>
        <p class="ptitle">${esc(p.title)}${varLbl}</p>
        <div class="prow">
          <span class="pprice">$${p.price.toFixed(2)}</span>
          ${compare}
        </div>
        ${sizes}${oos}
        <button class="padd"${p.inventory===0?' disabled':''}>
          ${p.inventory===0?'Out of Stock':'Add to cart'}
        </button>
      </div>
    </div>`;
}

/* ── Render grid ── */
function renderGrid(){
  const base=getDisplayProducts();
  const filtered=applyFilters(base);
  const sorted=applySort(filtered);
  const grid=$('pgrid');
  $('pcount').textContent=sorted.length+' product'+(sorted.length!==1?'s':'');
  if(!sorted.length){
    grid.innerHTML=`<div class="no-res"><h3>No products found</h3><p>Try removing some filters.</p></div>`;
    return;
  }
  grid.innerHTML=sorted.map(pCardHtml).join('');
  grid.querySelectorAll('.padd:not([disabled])').forEach(btn=>{
    btn.onclick=()=>{
      const c=$('cart-count');c.textContent=Number(c.textContent)+1;
      btn.textContent='Added ✓';btn.style.background='var(--new)';
      setTimeout(()=>{btn.textContent='Add to cart';btn.style.background='';},1400);
    };
  });
}

function attachFilterEvents(){
  document.querySelectorAll('[data-filter="type"]').forEach(chk=>{
    chk.onchange=()=>{chk.checked?activeFilters.types.add(chk.value):activeFilters.types.delete(chk.value);refreshFilters();};
  });
  document.querySelectorAll('[name="price-range"]').forEach(r=>{
    r.onchange=()=>{activeFilters.priceKey=r.checked?r.value:null;refreshFilters();};
  });
  document.querySelectorAll('.swatch').forEach(sw=>{
    sw.onclick=()=>{const c=sw.dataset.color;activeFilters.colors.has(c)?activeFilters.colors.delete(c):activeFilters.colors.add(c);refreshFilters();};
  });
  document.querySelectorAll('[data-filter="vendor"]').forEach(chk=>{
    chk.onchange=()=>{chk.checked?activeFilters.vendors.add(chk.value):activeFilters.vendors.delete(chk.value);refreshFilters();};
  });
}
function refreshFilters(){renderFilters();renderGrid();}
function renderActiveFilterTags(){
  const tags=[];
  [...activeFilters.types].forEach(t=>tags.push({label:'Type: '+t,clear:()=>activeFilters.types.delete(t)}));
  if(activeFilters.priceKey){const r=PRICE_RANGES.find(r=>r.key===activeFilters.priceKey);if(r)tags.push({label:r.label,clear:()=>{activeFilters.priceKey=null;}});}
  [...activeFilters.colors].forEach(c=>tags.push({label:'Color: '+c,clear:()=>activeFilters.colors.delete(c)}));
  [...activeFilters.vendors].forEach(v=>tags.push({label:v,clear:()=>activeFilters.vendors.delete(v)}));
  const afWrap=$('af-wrap');const clearBtn=$('clear-all-btn');
  if(!tags.length){afWrap.innerHTML='';clearBtn.classList.add('hidden');return;}
  clearBtn.classList.remove('hidden');
  afWrap.innerHTML=tags.map((t,i)=>`<span class="af-tag">${esc(t.label)}<button data-afi="${i}" title="Remove">×</button></span>`).join('');
  afWrap.querySelectorAll('[data-afi]').forEach(b=>{b.onclick=()=>{tags[Number(b.dataset.afi)].clear();refreshFilters();};});
}

function buildSortOptions(){

    return[{key:'featured',label:'Featured'},{key:'priceasc',label:'Price: Low to High'},{key:'pricedesc',label:'Price: High to Low'},{key:'az',label:'A – Z'},{key:'best',label:'Best Selling'}];
  }
  const opts=[];
  const excl=SORT_OPTS_RAW.find(o=>o.id===ACTIVE_EXCLUSIVE);
  if(excl)opts.push({key:excl.id,label:excl.label});
  SORT_OPTS_RAW.filter(o=>!o.exclusive&&o.enabled).forEach(o=>opts.push({key:o.id,label:o.label}));
  return opts.length?opts:[{key:'featured',label:'Featured'}];
}

/* ── Zero char ── */
function renderZeroChar(){
  const prods=ZERO_CHAR_IDS.map(id=>MOCK_PRODUCTS.find(p=>p.id===id)).filter(Boolean);
  $('so-zc-grid').innerHTML=prods.map(p=>`
    <div class="so-card">
      <div class="so-card-img" style="background:${gg(p.color)}"></div>
      <div class="so-card-info">
        <p class="so-card-title">${esc(p.title)}</p>
        <p class="so-card-price">$${p.price.toFixed(2)}</p>
      </div>
    </div>`).join('');
}

/* ── Numeric parsing ── */
function parseNumeric(q){
  if(!NUMERIC_ENABLED)return null;
  const range=q.match(/\$?(\d+(?:\.\d+)?)\s*[-–]\s*\$?(\d+(?:\.\d+)?)/);
  if(range){const lo=+range[1],hi=+range[2];return p=>p>=lo&&p<=hi;}
  const under=q.match(/under\s+\$?(\d+(?:\.\d+)?)/);
  if(under){const hi=+under[1];return p=>p<=hi;}
  const over=q.match(/over\s+\$?(\d+(?:\.\d+)?)/);
  if(over){const lo=+over[1];return p=>p>=lo;}
  const exact=q.match(/^\$(\d+(?:\.\d+)?)$/);
  if(exact){const v=+exact[1];return p=>Math.abs(p-v)/v<=0.25;}
  return null;
}

/* ── Live search ── */
$('so-inp').addEventListener('input',doSearch);
function doSearch(){
  const raw=$('so-inp').value;
  $('so-clear-btn').classList.toggle('hidden',!raw);
  const q=raw.trim();
  lastQuery=q;
  if(!q){
    $('so-zero').classList.remove('hidden');
    $('so-has-results').classList.add('hidden');
    $('so-empty').classList.add('hidden');
    renderZeroChar();return;
  }
  $('so-zero').classList.add('hidden');
  const qLow=q.toLowerCase();

  // Redirect check
  let redirected=false;
  for(const rd of REDIRECTS){
    if(rd.terms.some(t=>qLow===t||qLow.split(/\s+/).includes(t))){
      $('so-rd-msg').classList.remove('hidden');
      $('so-rd-label').textContent=rd.label;
      redirected=true;break;
    }
  }
  if(!redirected)$('so-rd-msg').classList.add('hidden');

  // No-result keyword check
  const tokens=qLow.split(/\s+/).filter(t=>t&&!STOP_WORDS.has(t));
  const isNoResKw=NO_RES_KEYWORDS.some(kw=>qLow===kw.toLowerCase()||tokens.includes(kw.toLowerCase()));

  // Numeric
  const numeric=parseNumeric(qLow);

  // Expand synonyms
  const allTerms=new Set(tokens);
  tokens.forEach(t=>(SYNONYMS[t]||[]).forEach(s=>allTerms.add(s)));

  let products=getDisplayProducts();
  if(numeric){
    products=products.filter(p=>numeric(p.price));
  }else if(allTerms.size){
    products=products.filter(p=>{
      const parts=[];
      if(SEARCH_FIELDS.has('title'))parts.push(p.title);
      if(SEARCH_FIELDS.has('type'))parts.push(p.type);
      if(SEARCH_FIELDS.has('vendor'))parts.push(p.vendor);
      if(SEARCH_FIELDS.has('color'))parts.push(p.color);
      if(SEARCH_FIELDS.has('sku'))parts.push(p.sku);
      if(SEARCH_FIELDS.has('tags'))parts.push(...(p.tags||[]));
      const haystack=parts.join(' ').toLowerCase();
      return[...allTerms].some(t=>haystack.includes(t));
    });
  }

  if((!products.length||isNoResKw)&&!redirected){
    $('so-has-results').classList.add('hidden');
    $('so-empty').classList.remove('hidden');
    $('so-query-lbl').textContent=q;
    const sug=NO_RES_IDS.map(id=>MOCK_PRODUCTS.find(p=>p.id===id)).filter(Boolean);
    $('so-sug-grid').innerHTML=sug.map(p=>`
      <div class="so-card">
        <div class="so-card-img" style="background:${gg(p.color)}"></div>
        <div class="so-card-info">
          <p class="so-card-title">${esc(p.title)}</p>
          <p class="so-card-price">$${p.price.toFixed(2)}</p>
        </div>
      </div>`).join('');
    return;
  }

  $('so-empty').classList.add('hidden');
  $('so-has-results').classList.remove('hidden');
  const top=products.slice(0,8);
  $('so-list').innerHTML=top.map(p=>`
    <div class="so-row-item">
      <div class="so-thumb" style="background:${gg(p.color)}"></div>
      <div class="so-item-info">
        <p class="so-item-title">${esc(p.title)}${p.variantLabel?' <span style="color:var(--text2);font-weight:400">– '+esc(p.variantLabel)+'</span>':''}</p>
        <p class="so-item-sub">${esc(p.type)} · ${esc(p.vendor)}</p>
      </div>
      <span class="so-item-price">$${p.price.toFixed(2)}</span>
    </div>`).join('');
  const va=$('so-view-all');
  if(products.length>8){va.classList.remove('hidden');va.textContent=`View all ${products.length} results →`;}
  else va.classList.add('hidden');
}
$('so-clear-btn').onclick=()=>{$('so-inp').value='';lastQuery='';doSearch();$('so-inp').focus();};

/* ── Settings status badge ── */
function renderStatusBadge(loaded){
  const total=5;
  const count=Object.values(loaded).filter(Boolean).length;
  const badge=$('settings-status');const txt=$('status-txt');
  if(count===0){badge.style.background='rgba(107,114,128,1)';txt.textContent='Using default settings';}
  else{badge.style.background='#16a34a';txt.textContent=`Settings loaded (${count}/${total})`;}
}

/* ── Init ── */
const _loaded=loadSettingsFromStorage();
sortKey=ACTIVE_EXCLUSIVE;
// Set initial sort label
(()=>{
  const opts=buildSortOptions();
  const active=opts.find(o=>o.key===sortKey)||opts[0];
  if(active)$('sort-lbl').textContent=active.label;
})();
renderFilters();
renderGrid();
renderStatusBadge(_loaded);
</script>
