<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Separated Variant Products – Findter Filter &amp; Search</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--ff:'Inter',-apple-system,BlinkMacSystemFont,'San Francisco','Segoe UI',sans-serif;
--bg:rgba(241,241,241,1);--sf:#fff;--sf-hov:rgba(247,247,247,1);--sf-act:rgba(243,243,243,1);
--fill:#303030;--fill-hov:#1a1a1a;--fill-t:rgba(0,0,0,.02);
--text:rgba(48,48,48,1);--text2:rgba(97,97,97,1);--textd:rgba(181,181,181,1);--lnk:rgba(0,91,211,1);
--bdr:rgba(227,227,227,1);--bdr-foc:rgba(0,91,211,1);
--r1:4px;--r2:8px;--r3:12px;
--sh1:0px 1px 0px 0px rgba(26,26,26,.07);
--sh3:0px 4px 6px -2px rgba(26,26,26,.2);
--shbtn:0px -1px 0px 0px #b5b5b5 inset,0px 0px 0px 1px rgba(0,0,0,.1) inset,0px .5px 0px 1.5px #fff inset;
--shbtn-hov:0px 1px 0px 0px #ebebeb inset,-1px 0px 0px 0px #ebebeb inset,1px 0px 0px 0px #ebebeb inset,0px -1px 0px 0px #ccc inset;
--shbtnp:0px -1px 0px 1px rgba(0,0,0,.8) inset,0px 0px 0px 1px rgba(48,48,48,1) inset,0px .5px 0px 1.5px rgba(255,255,255,.25) inset;
--shbtnp-hov:0px 1px 0px 0px rgba(255,255,255,.24) inset,1px 0px 0px 0px rgba(255,255,255,.2) inset,-1px 0px 0px 0px rgba(255,255,255,.2) inset,0px -1px 0px 0px #000 inset;
}
html,body{font-family:var(--ff);background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;min-height:100vh}
a{color:var(--lnk)}
.lay{display:flex;min-height:100vh}
.sb{width:248px;background:var(--sf);border-right:1px solid var(--bdr);display:flex;flex-direction:column;flex-shrink:0;transition:width .25s;min-height:100vh}
.sb.col{width:56px}
.sb-hd{padding:12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr);gap:8px;overflow:hidden}
.sb-logo{width:28px;height:28px;border-radius:6px;background:var(--fill);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-title{font-size:13px;font-weight:650;color:var(--text);flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.sb-tgl{width:28px;height:28px;border:none;background:transparent;cursor:pointer;border-radius:var(--r1);display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0}
.sb-tgl:hover{background:var(--sf-hov)}
.sb-nav{padding:8px;display:flex;flex-direction:column;gap:2px;flex:1}
.nav-btn{width:100%;border:none;background:transparent;cursor:pointer;padding:6px 12px;border-radius:var(--r2);font-family:var(--ff);font-size:13px;font-weight:450;color:var(--text2);text-align:left;display:flex;align-items:center;overflow:hidden;transition:background .1s,color .1s;white-space:nowrap}
.nav-btn:hover:not([disabled]){background:var(--sf-hov);color:var(--text)}
.nav-btn.act{background:var(--sf-act)!important;color:var(--text)!important;font-weight:650}
.nav-btn[disabled]{color:var(--textd)!important;cursor:not-allowed}
.nav-lbl{overflow:hidden;text-overflow:ellipsis}
.main{flex:1;overflow-x:hidden}
.pg{max-width:960px;margin:0 auto;padding:24px}
.ic{width:16px;height:16px;fill:currentColor;display:block;flex-shrink:0}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:6px 16px;height:32px;border-radius:var(--r2);font-family:var(--ff);font-size:13px;font-weight:550;cursor:pointer;border:none;white-space:nowrap;transition:box-shadow .1s,background .1s}
.btn-p{background:var(--fill);color:#fff;box-shadow:var(--shbtnp)}
.btn-p:hover{background:var(--fill-hov);box-shadow:var(--shbtnp-hov)}
.btn-s{background:var(--sf);color:var(--text);box-shadow:var(--shbtn)}
.btn-s:hover{box-shadow:var(--shbtn-hov)}
.back-a{width:32px;height:32px;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--r2);text-decoration:none;border:1px solid var(--bdr);background:var(--sf);color:var(--text2);box-shadow:var(--sh1);flex-shrink:0;transition:background .1s}
.back-a:hover{background:var(--sf-hov)}
.card{background:var(--sf);border-radius:var(--r2);box-shadow:var(--sh3);overflow:visible}
.card-hd{padding:16px;border-bottom:1px solid var(--bdr)}
.card-hd-ttl{font-size:13px;font-weight:650}
.card-hd-sub{font-size:12px;color:var(--text2);margin-top:2px}
.card-bd{padding:16px;display:flex;flex-direction:column;gap:16px}
.srch{display:flex;align-items:center;gap:8px;border:1px solid var(--bdr);border-radius:var(--r2);padding:7px 12px;background:var(--sf);transition:border-color .1s,box-shadow .1s;cursor:pointer}
.srch:focus-within{border-color:var(--bdr-foc);box-shadow:0 0 0 3px rgba(0,91,211,.2)}
.srch input{flex:1;border:none;outline:none;background:transparent;font-family:var(--ff);font-size:13px;color:var(--text);cursor:text}
.srch input::placeholder{color:var(--textd)}
.tgl{position:relative;display:inline-block;width:44px;height:24px;border:none;padding:0;cursor:pointer;border-radius:12px;outline:none;appearance:none;-webkit-appearance:none;transition:background .2s;flex-shrink:0;vertical-align:middle}
.tgl:focus-visible{box-shadow:0 0 0 3px rgba(0,91,211,.25)}
.tgl.on{background:var(--fill)}.tgl.off{background:rgba(204,204,204,1)}
.tgl-th{display:block;position:absolute;top:3px;left:3px;width:18px;height:18px;background:#fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,.3);transition:transform .2s;pointer-events:none}
.tgl.on .tgl-th{transform:translateX(20px)}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:var(--r1);background:var(--sf-act);font-size:12px;font-weight:550;color:var(--text)}
.fhint{font-size:12px;color:var(--text2);margin-top:3px}
.hidden{display:none!important}
.mt4{margin-top:16px}.mt5{margin-top:20px}
.frow{display:flex;gap:8px}.fend{justify-content:flex-end}
</style>
</head>
<body>
<div class="lay">
  <aside class="sb" id="sidebar">
    <div class="sb-hd">
      <div class="sb-logo">Fd</div>
      <span class="sb-title nav-lbl">Findter Filter &amp; Search</span>
      <button class="sb-tgl" id="sidebar-toggle" title="Toggle sidebar">
        <span id="toggle-icon"><svg class="ic" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.78 5.97a.75.75 0 0 1 0 1.06L8.81 10l2.97 2.97a.75.75 0 1 1-1.06 1.06l-3.5-3.5a.75.75 0 0 1 0-1.06l3.5-3.5a.75.75 0 0 1 1.06 0Z" fill="currentColor"/></svg></span>
      </button>
    </div>
    <div class="sb-nav" id="nav"></div>
  </aside>
  <main class="main">
    <div class="pg">

      <!-- Page header -->
      <div style="display:flex;align-items:center;gap:12px">
        <a href="index.html" class="back-a" title="Back to Settings">
          <svg class="ic" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M17 10a.75.75 0 0 1-.75.75H5.56l2.72 2.72a.75.75 0 1 1-1.06 1.06l-4-4a.75.75 0 0 1 0-1.06l4-4a.75.75 0 0 1 1.06 1.06L5.56 9.25H16.25A.75.75 0 0 1 17 10Z" fill="currentColor"/></svg>
        </a>
        <h1 style="font-size:1.25rem;font-weight:650;line-height:1.3">Separated variant products</h1>
      </div>

      <!-- Enable card -->
      <div class="card mt5">
        <div class="card-bd">
          <div style="display:flex;justify-content:space-between;align-items:center;gap:16px">
            <div>
              <p style="font-weight:550;font-size:13px">Enable to show variant as separate product</p>
              <p class="fhint">When enabled, each variant appears as its own product in collections.</p>
            </div>
            <button type="button" id="tgl-variant" class="tgl off"><span class="tgl-th"></span></button>
          </div>
        </div>
      </div>

      <!-- Separate by options card -->
      <div class="card mt4">
        <div class="card-hd">
          <p class="card-hd-ttl">Separate product by options</p>
          <p class="card-hd-sub">Choose which variant options are used to split products.</p>
        </div>
        <div class="card-bd">
          <div id="opt-wrap" style="position:relative">
            <!-- selected tags row -->
            <div id="selected-tags" style="display:none;flex-wrap:wrap;gap:4px;margin-bottom:8px"></div>
            <!-- search / trigger -->
            <div class="srch" id="opt-trigger">
              <svg class="ic" style="color:var(--textd)" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M13.74 12.68a6.5 6.5 0 1 1 1.06-1.06l3.26 3.27a.75.75 0 1 1-1.06 1.06l-3.26-3.27Zm.76-5.18a5 5 0 1 1-10 0 5 5 0 0 1 10 0Z" fill="currentColor"/></svg>
              <input id="opt-input" type="text" placeholder="Search variant option" autocomplete="off">
              <svg class="ic" id="opt-chevron" style="color:var(--textd);transition:transform .15s" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.22 8.22a.75.75 0 0 1 1.06 0L10 11.94l3.72-3.72a.75.75 0 1 1 1.06 1.06l-4.25 4.25a.75.75 0 0 1-1.06 0L5.22 9.28a.75.75 0 0 1 0-1.06Z" fill="currentColor"/></svg>
            </div>
            <!-- dropdown panel -->
            <div id="opt-dropdown" class="hidden" style="position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--sf);border:1px solid var(--bdr);border-radius:var(--r2);box-shadow:var(--sh3);z-index:20;max-height:220px;overflow-y:auto">
              <div id="opt-list"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Save / Cancel -->
      <div class="frow fend mt4">
        <button id="cancel-variant" class="btn btn-s">Cancel</button>
        <button id="save-variant" class="btn btn-p">Save</button>
      </div>

    </div>
  </main>
</div>
<script>
const $=id=>document.getElementById(id);
const IC={
  chevL:`<svg class="ic" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.78 5.97a.75.75 0 0 1 0 1.06L8.81 10l2.97 2.97a.75.75 0 1 1-1.06 1.06l-3.5-3.5a.75.75 0 0 1 0-1.06l3.5-3.5a.75.75 0 0 1 1.06 0Z" fill="currentColor"/></svg>`,
  chevR:`<svg class="ic" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.22 5.97a.75.75 0 0 0 0 1.06L11.19 10 8.22 12.97a.75.75 0 1 0 1.06 1.06l3.5-3.5a.75.75 0 0 0 0-1.06l-3.5-3.5a.75.75 0 0 0-1.06 0Z" fill="currentColor"/></svg>`,
  chk:`<svg class="ic" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M15.78 5.97a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L3.97 10.72a.75.75 0 0 1 1.06-1.06l3 3 6.69-6.69a.75.75 0 0 1 1.06 0Z" fill="currentColor"/></svg>`,
};
const NAV=[
  {id:'filter',label:'Filter'},{id:'search',label:'Search'},
  {id:'metafield',label:'Metafield'},
  {id:'grid',label:'Filter & Product Grid Design'},{id:'settings',label:'Settings'},
  {id:'analytics',label:'Analytics'},{id:'advanced',label:'Advanced Features'},
  {id:'storefront',label:'Storefront Preview'},
];
const ENABLED=new Set(['settings','metafield','search','storefront']);
const ACTIVE='settings';
let col=false;
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function renderNav(){
  $('nav').innerHTML=NAV.map(n=>{
    const en=ENABLED.has(n.id),act=n.id===ACTIVE;
    return `<button data-nav="${n.id}" ${en?'':'disabled'} class="nav-btn${act?' act':''}" title="${n.label}"><span class="nav-lbl">${escapeHtml(n.label)}</span></button>`;
  }).join('');
  $('nav').querySelectorAll('[data-nav]').forEach(b=>{
    if(ENABLED.has(b.dataset.nav))b.onclick=()=>{
      const v=b.dataset.nav;
      if(v==='settings')location.href='index.html';
      else if(v==='metafield')location.href='Metafield.html';
      else if(v==='search')location.href='Search.html';
      else if(v==='storefront')location.href='StoreFront.html';
    };
  });
  updateSb();
}
function updateSb(){
  $('sidebar').classList.toggle('col',col);
  $('sidebar').querySelectorAll('.nav-lbl').forEach(el=>el.classList.toggle('hidden',col));
  document.querySelector('.sb-title').classList.toggle('hidden',col);
  $('toggle-icon').innerHTML=col?IC.chevR:IC.chevL;
}
$('sidebar-toggle').onclick=()=>{col=!col;updateSb();};

/* ---- Toggle ---- */
const tglVariant=$('tgl-variant');
tglVariant.onclick=()=>{tglVariant.classList.toggle('on');tglVariant.classList.toggle('off');};

/* ---- Variant option dropdown ---- */
const VARIANT_OPTIONS=['Color','Size','Title','Material','Style','Pattern'];
let selectedOpts=new Set();
let dropOpen=false;

function setDropOpen(open){
  dropOpen=open;
  const drop=$('opt-dropdown');
  if(open){
    const r=$('opt-trigger').getBoundingClientRect();
    drop.style.position='fixed';
    drop.style.top=(r.bottom+4)+'px';
    drop.style.left=r.left+'px';
    drop.style.width=r.width+'px';
    drop.style.right='auto';
    drop.classList.remove('hidden');
    renderDropdown();
  }else{
    drop.classList.add('hidden');
  }
  $('opt-chevron').style.transform=open?'rotate(180deg)':'rotate(0deg)';
}

function renderDropdown(){
  const filter=$('opt-input').value.toLowerCase();
  const visible=VARIANT_OPTIONS.filter(o=>o.toLowerCase().includes(filter));
  if(!visible.length){
    $('opt-list').innerHTML=`<p style="padding:10px 12px;font-size:13px;color:var(--text2)">No options found</p>`;
    return;
  }
  $('opt-list').innerHTML=visible.map((o,i)=>`
    <label style="display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;font-size:13px;${i<visible.length-1?'border-bottom:1px solid var(--bdr)':''}">
      <input type="checkbox" data-opt="${escapeHtml(o)}" ${selectedOpts.has(o)?'checked':''}
             style="width:16px;height:16px;accent-color:var(--fill);cursor:pointer;flex-shrink:0">
      ${escapeHtml(o)}
    </label>`).join('');
  $('opt-list').querySelectorAll('[data-opt]').forEach(chk=>{
    chk.onchange=()=>{
      chk.checked?selectedOpts.add(chk.dataset.opt):selectedOpts.delete(chk.dataset.opt);
      renderTags();
    };
  });
}

function renderTags(){
  const el=$('selected-tags');
  if(!selectedOpts.size){el.style.display='none';return;}
  el.style.display='flex';
  el.innerHTML=[...selectedOpts].map(o=>
    `<span class="tag">${escapeHtml(o)}<button data-rm="${escapeHtml(o)}" style="background:none;border:none;cursor:pointer;color:var(--textd);margin-left:4px;font-size:15px;line-height:1;padding:0" title="Remove">×</button></span>`
  ).join('');
  el.querySelectorAll('[data-rm]').forEach(b=>{
    b.onclick=e=>{e.stopPropagation();selectedOpts.delete(b.dataset.rm);renderTags();if(dropOpen)renderDropdown();};
  });
}

$('opt-input').addEventListener('focus',()=>setDropOpen(true));
$('opt-input').addEventListener('input',()=>{if(!dropOpen)setDropOpen(true);else renderDropdown();});
$('opt-trigger').addEventListener('mousedown',e=>{
  if(e.target===$('opt-input'))return;
  e.preventDefault();
  dropOpen?setDropOpen(false):$('opt-input').focus();
});
document.addEventListener('click',e=>{if(!$('opt-wrap').contains(e.target))setDropOpen(false);});

/* ---- Save / Cancel ---- */
function snapshot(){
  return{enabled:tglVariant.classList.contains('on'),opts:new Set(selectedOpts)};
}
function restore(s){
  tglVariant.classList.toggle('on',s.enabled);
  tglVariant.classList.toggle('off',!s.enabled);
  selectedOpts=new Set(s.opts);
  renderTags();
  if(dropOpen)renderDropdown();
}
let saved=snapshot();
$('save-variant').onclick=()=>{
  saved=snapshot();
  const btn=$('save-variant');btn.innerHTML=IC.chk+' Saved';
  setTimeout(()=>{btn.innerHTML='Save';},1500);
};
$('cancel-variant').onclick=()=>restore(saved);

renderNav();
</script>
</body>
</html>
